owner: diffyne-com
repo: status

sites:
  - name: Landing Page
    url: https://diffyne.com
  
  - name: Dashboard
    url: https://app.diffyne.com
  
  - name: Backend API
    url: https://api.diffyne.com/health
    method: GET
  
  - name: Changelog Widget
    url: https://api.diffyne.com/widget.js
    method: GET

status-website:
  cname: ping.diffyne.com
  logoUrl: https://app.diffyne.com/logo-white.png
  title: Status
  name: Diffyne Status
  introHtml: "Real-time monitor of Diffyne services and infrastructure."
  theme: dark
  navbar:
    - title: Website
      href: https://diffyne.com
    - title: Dashboard
      href: https://app.diffyne.com

  customCss: |
    :root {
      --color-primary: #22c55e;
      --color-success: #22c55e;
      --color-danger: #ef4444;
      --color-warning: #f59e0b;
      --color-text: #ffffff;
      --color-text-muted: #9ca3af;
      --color-background: #000000;
    }

    body {
      background-color: #000000 !important;
      background-image: linear-gradient(to right, rgba(34,197,94,0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(34,197,94,0.1) 1px, transparent 1px) !important;
      background-size: 64px 64px !important;
    }

    nav {
      background-color: rgba(5, 5, 5, 0.8) !important;
      backdrop-filter: blur(12px) !important;
      border-bottom: 1px solid #1f2937 !important;
    }

    .container {
      background: transparent !important;
      box-shadow: none !important;
    }

    article, section, .card, .uptime-history {
      background-color: #0a0a0a !important;
      border: 1px solid #1f2937 !important;
      border-radius: 0.5rem !important;
      padding: 1.5rem !important;
      margin-bottom: 1.5rem !important;
    }

    a {
      color: var(--color-primary) !important;
    }
    
    .button {
      background-color: transparent !important;
      border: 1px solid var(--color-primary) !important;
      color: var(--color-primary) !important;
      border-radius: 0.375rem !important;
    }

    .button:hover {
      background-color: rgba(34, 197, 94, 0.1) !important;
    }